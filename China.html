<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Scenery of China</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fff; padding: 50px; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .gallery img { 
        width: 300px;           
        height: 200px;          
        object-fit: cover;      
        
        border: 8px solid white; 
        border-radius: 12px;   
        box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        transition: 0.3s; 
    }

    .gallery img:hover { 
        transform: translateY(-5px); 
        box-shadow: 0 8px 15px rgba(0,0,0,0.2); 
    }
        
        .back-btn:hover { 
            background: #357abd; 
        }
        .back-btn { 
            display: inline-block; 
            margin-bottom: 20px; 
            padding: 12px 25px; 
            background: #4a90e2; 
            color: white; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        
        .back-btn:hover { 
            background: #357abd; 
        }
    </style>
</head>
<body>
<a href="index.html" class="back-btn">← Back to Home</a>

    <h1>Beautiful Scenery of China</h1>
    <p>Memories and landscapes from my hometown.</p>
   
    <div class="gallery">
        <img src="China1.jpg" alt="China Landscape 1">
        <img src="China2.jpg" alt="China Landscape 2">
        <img src="China3.jpg" alt="China Landscape 3">
        <img src="China4.jpg" alt="China Landscape 4">
        <img src="China5.jpg" alt="China Landscape 5">
        <img src="China6.jpg" alt="China Landscape 6">
    </div>

</body>
</html>
